name: 钉钉定时群通知
on:
  schedule:
    # UTC 23:00 = 北京时间 7:00 触发
    # 延迟 2 小时 → 9:00 送达
    - cron: '0 23 * * 0-4'
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: 发送钉钉消息
        uses: fjogeleit/http-request-action@v1
        with:
          url: ${{ secrets.DING_WEBHOOK }}
          method: 'POST'
          contentType: 'application/json'
          data: '{"msgtype":"text","text":{"content":"通知：请大家遇到异常或刊登错误及时反馈！"}}'
